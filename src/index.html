<html>
<body>
<script type="text/javascript" async>
    (() =>
    {
        const url = new URL(location.href)
        const monitorId = url.searchParams.get('monitorId');
        const periodStart = url.searchParams.get('periodStart');
        const periodEnd = url.searchParams.get('periodEnd');
        const API_ENDPOINT = url.protocol + '//' + url.hostname + ':9200';
        const DASHBOARD_ENDPOINT = url.protocol + '//' + url.hostname;

        if (!monitorId || !periodStart || !periodEnd) {
            document.write('Invalid request');
            return;
        }
        fetch(API_ENDPOINT + '/_plugins/_alerting/monitors/' + monitorId, {
            credentials: "include",
            mode: "same-origin"
        }).then(response => {
            if (!response.ok) {
                document.write('Failed to get monitor');
                return;
            }
            console.log(response)
        }).catch((a) => {
            document.write(a)
        });
    })();

</script>
</body>
</html>
