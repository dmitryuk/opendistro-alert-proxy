services:
    opensearch:
        image: opensearchproject/opensearch:2.12.0
        container_name: opensearch
        env_file:
            - .env
            - .env.local
        environment:
            cluster.name: opensearch-cluster
            node.name: opensearch-node1
            discovery.type: single-node
            bootstrap.memory_lock: true
            OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - opensearch-data:/usr/share/opensearch/data
        ports:
            - "9200:9200"
            - "9600:9600"
        networks:
            - opensearch-net
        healthcheck:
            test: ["CMD-SHELL", "curl -f -k -u $$OPENSEARCH_USERNAME:$$OPENSEARCH_PASSWORD --max-time 5 https://localhost:9200/_cluster/health || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 5

    opensearch-dashboards:
        image: opensearchproject/opensearch-dashboards:2.12.0
        container_name: opensearch-dashboards
        ports:
            - "5601:5601"
        environment:
            OPENSEARCH_HOSTS: "https://opensearch:9200"
            OPENSEARCH_SSL_VERIFICATION_MODE: none
        env_file:
            - .env
            - .env.local
        networks:
            - opensearch-net
        depends_on:
            opensearch:
                condition: service_healthy

    nodejs-app:
        build:
            dockerfile: ./Dockerfile
            context: .
        command: [ "npm", "run", "dev"]
        ports:
            - "3000:80"
            - "9229:9229"
        networks:
            - opensearch-net
        env_file:
            - .env
            - .env.local
#        depends_on:
#            opensearch:
#                condition: service_healthy
#            opensearch-dashboards:
#                condition: service_started
        volumes:
            - ./:/app
volumes:
    opensearch-data:

networks:
    opensearch-net:
        driver: bridge